<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- 5 dots in ascending arc representing skill levels -->
  <circle cx="2"  cy="12" r="1.5" fill="#000" opacity="0.35"/>
  <circle cx="5"  cy="8.5"  r="1.5" fill="#000" opacity="0.55"/>
  <circle cx="8"  cy="5.5"  r="1.5" fill="#000" opacity="0.75"/>
  <circle cx="11" cy="3.2" r="1.5" fill="#000" opacity="0.9"/>
  <circle cx="14" cy="1.8" r="1.5" fill="#000"/>
  <!-- baseline -->
  <line x1="1" y1="14" x2="15" y2="14" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
</svg>
